<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <!-- Tailwind and daisyUI link  -->

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>


    <!-- Google font  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body>
    <main class=" flex mx-auto justify-center items-center">


        <!-- login section -->

        <div class="fieldset bg-base-200 border-base-300 rounded-box w-xs border p-4">
            <div class="text-center items-center ">
                <img class="mx-auto" src="./assets/github-logo.png" alt="">
                <h2 class="text-2xl font-bold mt-5">GitHub Issues Tracker</h2>
                <p class="text-gray-600 mb-5">Sign in to manage your issues</p>
            </div>
            <div>
                <label class="label font-semibold text-black">Username</label>
                <input id="userName" type="email" class="input" placeholder="Enter Username" />
                <p class="text-blue-600 mt-1">Default: admin</p>

                <label class="label font-semibold text-black">Password</label>
                <input id="password" type="password" class="input" placeholder="Enter Password" />
                <p class="text-blue-600 mt-1">Default: admin123</p>

                <button id="signIn" class="btn btn-active btn-primary w-full mt-4">Sign In</button>
            </div>

            <!-- Divider -->
            <div class="divider">OR</div>

            <!-- Demo Credentials -->
            <div class="bg-base-300 p-4 rounded-lg text-center">
                <p class="text-gray-500 mb-2">Demo Credentials:</p>
                <p><span class="font-semibold">Username:</span> admin</p>
                <p><span class="font-semibold">Password:</span> admin123</p>
            </div>
        </div>



    </main>

    <script src="./login.js"></script>
</body>

</html>
